<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>仙剑奇侠传 - 触屏版</title>
    <style>
        * {
            user-select: none;
            touch-action: manipulation;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }
        /* 游戏区域 */
        #game-area {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
            z-index: 1;
        }
        canvas {
            width: auto !important;
            height: auto !important;
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            display: block;
            outline: none;
        }
        /* 虚拟键盘容器 */
        .virtual-keyboard {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
        }
        /* ========== 横屏布局（独立） ========== */
        @media (orientation: landscape) {
            .virtual-keyboard {
                display: flex;
                justify-content: space-between;
                align-items: center;
            }
            /* 方向键：左侧 */
            .dpad {
                display: grid;
                grid-template-columns: repeat(3, 80px);
                grid-template-rows: repeat(2, 80px);
                gap: 12px;
                justify-items: center;
                align-items: center;
                pointer-events: auto;
                padding: 20px;
            }
            .dpad .up { grid-column: 2 / 3; grid-row: 1 / 2; }
            .dpad .left { grid-column: 1 / 2; grid-row: 2 / 3; }
            .dpad .down { grid-column: 2 / 3; grid-row: 2 / 3; }
            .dpad .right { grid-column: 3 / 4; grid-row: 2 / 3; }
            /* 确认取消：右侧垂直排列 */
            .action-buttons {
                display: flex;
                flex-direction: column;
                gap: 20px;
                pointer-events: auto;
                padding: 20px;
            }
        }
        /* ========== 竖屏布局（独立） ========== */
        @media (orientation: portrait) {
            .virtual-keyboard {
                display: flex;
                flex-direction: column;
                justify-content: flex-end;
            }
            /* 下部容器：左右两半 */
            .keyboard-bottom {
                display: flex;
                justify-content: space-between;
                align-items: center;
                width: 100%;
                padding: 12px 20px;
                box-sizing: border-box;
                pointer-events: none;
            }
            /* 方向键：左下 */
            .dpad {
                display: grid;
                grid-template-columns: repeat(3, 70px);
                grid-template-rows: repeat(2, 70px);
                gap: 8px;
                justify-items: center;
                align-items: center;
                pointer-events: auto;
            }
            .dpad .up { grid-column: 2 / 3; grid-row: 1 / 2; }
            .dpad .left { grid-column: 1 / 2; grid-row: 2 / 3; }
            .dpad .down { grid-column: 2 / 3; grid-row: 2 / 3; }
            .dpad .right { grid-column: 3 / 4; grid-row: 2 / 3; }
            /* 确认取消：右下垂直排列 */
            .action-buttons {
                display: flex;
                flex-direction: column;
                gap: 16px;
                pointer-events: auto;
            }
        }
        /* 按钮通用样式 */
        .key-btn {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            background: rgba(0,0,0,0.4);
            border: 2px solid rgba(255,255,255,0.6);
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            line-height: 80px;
            cursor: pointer;
            touch-action: manipulation;
            transition: all 0.05s linear;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }
        .action-buttons .key-btn {
            width: 100px;
        }
        .key-btn:active {
            transform: scale(0.94);
            background: #1abc9c;
            color: #000;
        }
        /* 竖屏时按钮稍小 */
        @media (orientation: portrait) {
            .key-btn {
                width: 70px;
                height: 70px;
                line-height: 70px;
                font-size: 20px;
            }
            .action-buttons .key-btn {
                width: 90px;
            }
        }
        /* 启动遮罩 */
        #start-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 2000;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        #start-btn {
            padding: 16px 40px;
            font-size: 26px;
            font-weight: bold;
            background: #4caf50;
            color: white;
            border: none;
            border-radius: 60px;
            cursor: pointer;
        }
        .info {
            color: #ccc;
            margin-top: 20px;
            font-size: 14px;
        }
    </style>
</head>
<body>
<div id="game-area">
    <canvas id="jsdos" tabindex="0"></canvas>
</div>

<div class="virtual-keyboard" id="virtualKeyboard" style="display: none;">
    <!-- 竖屏时需要这个包装层，横屏时忽略 -->
    <div class="keyboard-bottom">
        <div class="dpad">
            <div class="key-btn up" data-key="ArrowUp" data-code="38">▲</div>
            <div class="key-btn left" data-key="ArrowLeft" data-code="37">◀</div>
            <div class="key-btn down" data-key="ArrowDown" data-code="40">▼</div>
            <div class="key-btn right" data-key="ArrowRight" data-code="39">▶</div>
        </div>
        <div class="action-buttons">
            <div class="key-btn" data-key=" " data-code="32">确认</div>
            <div class="key-btn" data-key="Escape" data-code="27">取消</div>
        </div>
    </div>
</div>

<script src="js-dos.js"></script>
<script>
    (function() {
        var canvas = document.getElementById('jsdos');
        var virtualKeyboard = document.getElementById('virtualKeyboard');
        var isGameStarted = false;

        function sendKeyEvent(key, keyCode, type) {
            if (!canvas) return;
            canvas.focus();
            canvas.dispatchEvent(new KeyboardEvent(type, { key: key, keyCode: keyCode, bubbles: true }));
        }

        function startGame() {
            if (isGameStarted) return;
            isGameStarted = true;
            virtualKeyboard.style.display = 'flex';

            Dos(canvas).ready(function(fs, main) {
                fs.extract("rom/pal.zip").then(function() {
                    main(["-c", "cd pal", "-c", "PAL!.EXE"]);
                }).catch(function(err) {
                    console.error("解压失败:", err);
                    alert("游戏加载失败，请检查 rom/pal.zip 是否存在");
                });
            });
        }

        function bindVirtualKeys() {
            var btns = document.querySelectorAll('.key-btn');
            btns.forEach(function(btn) {
                var key = btn.getAttribute('data-key');
                var keyCode = parseInt(btn.getAttribute('data-code'), 10);
                if (!key || isNaN(keyCode)) return;

                var onPress = function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    sendKeyEvent(key, keyCode, 'keydown');
                };
                var onRelease = function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    sendKeyEvent(key, keyCode, 'keyup');
                };

                btn.addEventListener('mousedown', onPress);
                btn.addEventListener('mouseup', onRelease);
                btn.addEventListener('touchstart', onPress, { passive: false });
                btn.addEventListener('touchend', onRelease);
                btn.addEventListener('touchcancel', onRelease);
            });
        }

        var startOverlay = document.createElement('div');
        startOverlay.id = 'start-overlay';
        var startBtn = document.createElement('button');
        startBtn.id = 'start-btn';
        startBtn.textContent = '🎮 开始游戏';
        var info = document.createElement('div');
        info.className = 'info';
        info.textContent = '点击后启动，虚拟键盘将出现';
        startOverlay.appendChild(startBtn);
        startOverlay.appendChild(info);
        document.body.appendChild(startOverlay);

        startBtn.addEventListener('click', function() {
            startOverlay.remove();
            startGame();
            bindVirtualKeys();
        });
    })();
</script>
</body>
</html>
